name: update
on:
  schedule:
    - cron: '30 8 * * 1-5'
    - cron: '45 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '15 9 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '45 9 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '15 10 * * 1-5'
    - cron: '30 10 * * 1-5'
    - cron: '45 10 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '15 11 * * 1-5'
    - cron: '30 11 * * 1-5'
    - cron: '45 11 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '15 12 * * 1-5'
    - cron: '30 12 * * 1-5'
    - cron: '45 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '15 13 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '45 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '15 14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      force_archive:
        description: '월말 아카이브 강제 생성 (1 입력)'
        required: false
        default: ''
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          FORCE_ARCHIVE: ${{ github.event.inputs.force_archive }}
        run: python generate.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update
          file_pattern: '*.html archive/**/*.html'
