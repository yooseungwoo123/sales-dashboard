name: update
on:
  schedule:
    - cron: '*/3 0-8 * * 1-5'
    - cron: '*/15 9-15 * * 1-5'
  workflow_dispatch:
    inputs:
      force_archive:
        description: '월말 아카이브 강제 생성 (1 입력)'
        required: false
        default: ''
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          FORCE_ARCHIVE: ${{ github.event.inputs.force_archive }}
        run: python generate.py
      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "update"
          git push
