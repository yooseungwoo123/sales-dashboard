<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업팀 일간 보고</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:#f5f6f8;color:#323338;font-size:13px}
.topbar{background:#fff;border-bottom:1px solid #e6e9ef;padding:8px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:14px;font-weight:700;color:#323338;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;background:#0073ea;border-radius:50%}
.topbar-right{display:flex;gap:8px;margin-left:auto;align-items:center}
.ts{font-size:11px;color:#676879}
.btn{font-size:12px;padding:6px 14px;border-radius:4px;border:1px solid #0073ea;background:#0073ea;color:#fff;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px}
.btn:hover{background:#0060c0}
.btn:disabled{opacity:.5;cursor:default}
.week-nav{background:#fff;border-bottom:1px solid #e6e9ef;padding:8px 16px;display:flex;align-items:center;gap:8px}
.wnbtn{width:28px;height:28px;border-radius:50%;border:1px solid #e6e9ef;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#676879;line-height:1}
.wnbtn:hover{background:#f5f6f8}
.wnbtn:disabled{opacity:.3;cursor:default}
.wlabel{font-size:13px;font-weight:600;color:#323338;min-width:200px;text-align:center}
.wtbtn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #e6e9ef;background:#fff;color:#676879;cursor:pointer}
.wtbtn:hover{background:#f5f6f8}
.wtbtn.aw{background:#e8f0fe;color:#0073ea;border-color:#0073ea}
.day-tabs{display:flex;background:#fff;border-bottom:1px solid #e6e9ef;padding:0 16px;overflow-x:auto}
.day-tab{font-size:12px;padding:10px 16px;border-bottom:3px solid transparent;color:#676879;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.day-tab:hover{color:#323338;background:#f5f6f8}
.day-tab.active{color:#0073ea;border-bottom-color:#0073ea}
.ddot{width:6px;height:6px;border-radius:50%;background:#00c875;display:none}
.day-tab.hd .ddot{display:inline-block}
.sbar{background:#fff;padding:8px 16px;border-bottom:1px solid #e6e9ef;display:flex;gap:6px;flex-wrap:wrap}
.sc{font-size:11px;padding:4px 10px;border-radius:4px;background:#f5f6f8;color:#676879;border:1px solid #e6e9ef}
.sc b{color:#323338;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;padding:14px 16px}
.card{background:#fff;border-radius:8px;border:1px solid #e6e9ef;overflow:hidden}
.ch{padding:11px 14px;border-bottom:1px solid #e6e9ef;display:flex;align-items:center;gap:10px;background:#fafbfc}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.mn{font-size:13px;font-weight:700;color:#323338}
.mr{font-size:11px;color:#676879;margin-top:1px}
.hcs{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.chip{font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:500}
.cn{background:#e8f0fe;color:#1565c0}.cc{background:#dcfce7;color:#15803d}.cf{background:#fef9c3;color:#854d0e}.cok{background:#d1fae5;color:#065f46}.cno{background:#f5f6f8;color:#676879;border:1px solid #e6e9ef}.cd{background:#ede9fe;color:#5b21b6}
.tc{display:grid;grid-template-columns:1fr 1fr}
.sec{padding:11px 14px;border-bottom:1px solid #e6e9ef}
.sec:last-child{border-bottom:none}
.tc .sec:first-child{border-right:1px solid #e6e9ef}
.sl{font-size:10px;font-weight:700;color:#676879;letter-spacing:.4px;margin-bottom:7px;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tb{font-size:12px;color:#323338;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:150px;overflow-y:auto}
.tb::-webkit-scrollbar{width:3px}.tb::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.fg{margin-bottom:10px}.fg:last-child{margin-bottom:0}
.fgl{font-size:10px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:4px}
.pf{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;border:1px solid #e6e9ef;cursor:pointer;display:block}
.pf:hover{opacity:.85}
.vi{width:100%;border-radius:6px;border:1px solid #e6e9ef;display:block;max-height:200px;background:#000;margin-bottom:4px}
.ap{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 10px;margin-bottom:4px}
.pb{width:28px;height:28px;border-radius:50%;background:#15803d;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb:hover{background:#166534}
.pi{width:0;height:0;border-style:solid;border-width:5px 0 5px 9px;border-color:transparent transparent transparent #fff;margin-left:2px}
.ai{flex:1;min-width:0}
.an{font-size:11px;color:#15803d;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apr{width:100%;height:3px;background:#bbf7d0;border-radius:2px;margin-top:4px;cursor:pointer}
.ab{height:100%;background:#15803d;border-radius:2px;width:0%}
.at{font-size:10px;color:#15803d;opacity:.7;flex-shrink:0}
.dc{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 9px;border-radius:4px;text-decoration:none;background:#f5f6f8;color:#676879;border:1px solid #e6e9ef;margin-bottom:4px}
.dc:hover{background:#e6e9ef}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;padding:16px}
.lb.open{display:flex}
.lbi{max-width:92vw;max-height:90vh;border-radius:8px;object-fit:contain}
.lbc{position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.8}
.lbc:hover{opacity:1}
.fbl{display:flex;flex-direction:column;gap:8px}
.fbc{border:1px solid #e6e9ef;border-radius:6px;overflow:hidden}
.fbh{background:#fafbfc;padding:8px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #e6e9ef}
.fbi{font-size:12px;font-weight:700;color:#323338}
.fbb{padding:10px 11px}
.fbt{font-size:12px;color:#323338;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}
.fbt::-webkit-scrollbar{width:3px}.fbt::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.fbm{padding:10px 11px;border-top:1px solid #e6e9ef;background:#fafbfc}
.empty{padding:3rem;text-align:center;color:#676879;font-size:13px;grid-column:1/-1;line-height:2.2}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:#676879;gap:10px;font-size:13px;grid-column:1/-1}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid #e6e9ef;border-top-color:#0073ea;border-radius:50%;animation:spin .8s linear infinite}
.spin{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>영업팀 일간 보고</div>
  <div class="topbar-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadLive()"><span id="ri">↻</span> 데이터 불러오기</button>
  </div>
</div>
<div class="week-nav">
  <button class="wnbtn" id="pb" onclick="changeWeek(-1)">‹</button>
  <span class="wlabel" id="wl">불러오는 중...</span>
  <button class="wnbtn" id="nb" onclick="changeWeek(1)">›</button>
  <button class="wtbtn" id="tb" onclick="goNow()">이번 주</button>
</div>
<div class="day-tabs" id="dt"></div>
<div class="sbar" id="sb"></div>
<div class="grid" id="mg"><div class="empty">👆 위의 <b>데이터 불러오기</b> 버튼을 클릭하세요</div></div>
<div class="lb" id="lb" onclick="closeLb()">
  <button class="lbc" onclick="closeLb()">✕</button>
  <img class="lbi" id="lbi" src="" alt="">
</div>
<script>
const BID="5027844606",MU="https://mcp.monday.com/mcp";
const CL={"유승우":{bg:"#dbeafe",tx:"#1e40af"},"박승제":{bg:"#fee2e2",tx:"#991b1b"},"황소정":{bg:"#dcfce7",tx:"#166534"},"정민규":{bg:"#fef3c7",tx:"#92400e"},"심승근":{bg:"#ede9fe",tx:"#5b21b6"},"이현우":{bg:"#d1fae5",tx:"#065f46"},"최태웅":{bg:"#fce7f3",tx:"#9d174d"},"서은경":{bg:"#e0f2fe",tx:"#075985"},"박성제":{bg:"#f1f5f9",tx:"#334155"}};
let persons=[],selDate=null,wOff=0,aMap={};
function gwd(o){const n=new Date(),d=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1)+(o*7));return Array.from({length:5},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().slice(0,10)});}
function fwl(w){const s=w[0],e=w[4],sm=s.slice(5,7),sd=s.slice(8),em=e.slice(5,7),ed=e.slice(8);const wn=Math.ceil((new Date(s).getDate()+(new Date(s.slice(0,7)+"-01").getDay()))/7);return`${s.slice(0,4)}년 ${parseInt(sm)}월 ${wn}주차 (${sm}/${sd} ~ ${em}/${ed})`;}
function pf(v){return v&&typeof v==="string"?v.split(",").map(s=>s.trim()).filter(Boolean):[];}
function ft(u){const e=(u.split("?")[0].split(".").pop()||"").toLowerCase();if(["jpg","jpeg","png","gif","webp","heic"].includes(e))return"photo";if(["mp3","m4a","wav","aac","ogg"].includes(e))return"audio";if(["mp4","mov"].includes(e))return"video";return"doc";}
function fn(u,i){try{const p=decodeURIComponent(u).split("/"),n=p[p.length-1];if(n&&!n.startsWith("file_"))return n.length>28?n.slice(0,25)+"…":n;}catch(e){}return"파일"+(i+1);}
function gc(n){for(const[k,v]of Object.entries(CL)){if(n&&n.includes(k))return v;}return{bg:"#f1f5f9",tx:"#334155"};}
function ini(n){return(n||"").replace(/\s*(팀장|부팀장|사원|대표님)\s*/g,"").slice(0,2);}
function es(t){if(!t)return{};const c=t.match(/계약\s*[:：]\s*([\d.]+)/),f=t.match(/수임료\s*[:：]\s*([\d.]+)/),n=t.match(/신규\s*[:：]\s*(\d+)/);return{c:c?c[1]:null,f:f?f[1]:null,n:n?n[1]:null};}
function openLb(u){document.getElementById("lbi").src=u;document.getElementById("lb").classList.add("open");}
function closeLb(){document.getElementById("lb").classList.remove("open");document.getElementById("lbi").src="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();});
function tAud(id){const a=aMap[id];if(!a)return;const btn=document.getElementById("pb_"+id),bar=document.getElementById("ab_"+id),te=document.getElementById("at_"+id);
if(a.paused){Object.entries(aMap).forEach(([k,v])=>{if(k!==id&&!v.paused){v.pause();document.getElementById("pb_"+k).innerHTML='<div class="pi"></div>';}});a.play();btn.innerHTML='<div style="display:flex;gap:2px"><div style="width:3px;height:10px;background:#fff;border-radius:1px"></div><div style="width:3px;height:10px;background:#fff;border-radius:1px"></div></div>';}
else{a.pause();btn.innerHTML='<div class="pi"></div>';}
a.ontimeupdate=()=>{if(a.duration)bar.style.width=(a.currentTime/a.duration*100)+"%";const m=Math.floor(a.currentTime/60),s=Math.floor(a.currentTime%60);te.textContent=m+":"+String(s).padStart(2,"0");};
a.onended=()=>{btn.innerHTML='<div class="pi"></div>';bar.style.width="0%";};}
function sAud(e,id){const a=aMap[id];if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();a.currentTime=(e.clientX-r.left)/r.width*a.duration;}
function rAud(u,i){const id="a"+Math.random().toString(36).slice(2),nm=fn(u,i);setTimeout(()=>{aMap[id]=new Audio(u);},0);
return`<div class="ap"><button class="pb" id="pb_${id}" onclick="tAud('${id}')"><div class="pi"></div></button><div class="ai"><div class="an">${nm}</div><div class="apr" onclick="sAud(event,'${id}')"><div class="ab" id="ab_${id}"></div></div></div><span class="at" id="at_${id}">0:00</span></div>`;}
function rMB(lbl,col,files){if(!files||!files.length)return"";
const ph=files.filter(u=>ft(u)==="photo"),au=files.filter(u=>ft(u)==="audio"),vi=files.filter(u=>ft(u)==="video"),dc=files.filter(u=>ft(u)==="doc");
let h=`<div class="fg"><div class="fgl" style="color:${col}">${lbl}</div>`;
if(ph.length)h+=`<div class="pg">${ph.map((u,i)=>`<img class="pf" src="${u}" onclick="openLb('${u}')" loading="lazy" onerror="this.style.display='none'">`).join("")}</div>`;
if(vi.length)h+=vi.map(u=>`<video class="vi" controls preload="metadata" src="${u}"></video>`).join("");
if(au.length)h+=au.map((u,i)=>rAud(u,i)).join("");
if(dc.length)h+=dc.map((u,i)=>`<a class="dc" href="${u}" target="_blank">📄 ${fn(u,i)}</a>`).join("");
return h+"</div>";}
function changeWeek(d){if(d>0&&wOff>=0)return;wOff+=d;rv();}
function goNow(){wOff=0;rv();}
function rv(){const w=gwd(wOff);const today=new Date().toISOString().slice(0,10);const dwd=w.filter(d=>persons.some(p=>p.days&&p.days[d]));
selDate=dwd.length?(dwd.includes(today)?today:dwd[dwd.length-1]):(w.includes(today)?today:w[4]);
document.getElementById("wl").textContent=fwl(w);
document.getElementById("tb").classList.toggle("aw",wOff===0);
document.getElementById("nb").disabled=wOff>=0;
rTabs(w);render(w);}
function rTabs(w){const lb=["월","화","수","목","금"];
document.getElementById("dt").innerHTML=w.map((d,i)=>{const hd=persons.some(p=>p.days&&p.days[d]);
return`<div class="day-tab ${d===selDate?"active":""} ${hd?"hd":""}" onclick="sDay('${d}','${w.join(",")}')"><div class="ddot"></div>${lb[i]}요일 <span style="color:#c5c7d4;font-size:11px">${d.slice(5).replace("-",".")}</span></div>`;}).join("");}
function sDay(d,ws){selDate=d;const dates=ws.split(",");document.querySelectorAll(".day-tab").forEach((t,i)=>t.classList.toggle("active",dates[i]===d));render(dates);}
function render(w){if(!w)w=gwd(wOff);const wd=persons.filter(p=>p.days&&p.days[selDate]);
const tn=wd.reduce((a,p)=>{const m=(p.days[selDate]?.retire||"").match(/신규\s*[:：]\s*(\d+)/);return a+(m?+m[1]:0);},0);
const tc=wd.reduce((a,p)=>{const m=(p.days[selDate]?.retire||"").match(/계약\s*[:：]\s*([\d.]+)/);return a+(m?+m[1]:0);},0);
const tf=wd.reduce((a,p)=>{const m=(p.days[selDate]?.retire||"").match(/수임료\s*[:：]\s*([\d.]+)/);return a+(m?+m[1]:0);},0);
const cd=wd.filter(p=>p.days[selDate]?.confirm==="컨펌 완료").length;
document.getElementById("sb").innerHTML=[`<div class="sc">보고 <b>${wd.length}명</b></div>`,`<div class="sc">신규 <b>${tn}건</b></div>`,`<div class="sc">계약 <b>${tc}건</b></div>`,tf>0?`<div class="sc">수임료 <b>${tf.toFixed(1)}</b></div>`:"",`<div class="sc">컨펌 <b>${cd}/${wd.length||persons.length}</b></div>`,persons.length-wd.length>0?`<div class="sc" style="opacity:.6">미제출 ${persons.length-wd.length}명</div>`:""].filter(Boolean).join("");
if(!wd.length){const fut=selDate>new Date().toISOString().slice(0,10);document.getElementById("mg").innerHTML=`<div class="empty">${fut?"📅 아직 보고가 올라오지 않은 날짜예요":"📋 해당 날짜의 보고가 없어요"}<br><span style="font-size:12px;color:#c5c7d4">← 이전 주 버튼으로 지난 보고를 확인할 수 있어요</span></div>`;return;}
aMap={};document.getElementById("mg").innerHTML=persons.map(p=>rCard(p)).join("");}
function rCard(p){const d=p.days&&p.days[selDate],cl=gc(p.name),av=ini(p.name);
if(!d)return`<div class="card"><div class="ch"><div class="av" style="background:${cl.bg};color:${cl.tx}">${av}</div><div><div class="mn">${p.name}</div><div class="mr">미제출</div></div><div class="hcs"><span class="chip cno">보고 없음</span></div></div></div>`;
const st=es(d.retire);
const chips=[st.n?`<span class="chip cn">신규 ${st.n}건</span>`:"",st.c?`<span class="chip cc">계약 ${st.c}건</span>`:"",st.f?`<span class="chip cf">수임 ${st.f}</span>`:"",d.confirm==="컨펌 완료"?`<span class="chip cok">✓ 컨펌완료</span>`:`<span class="chip cno">미컨펌</span>`,(d.diary?.length||d.call?.length||d.anal?.length)?`<span class="chip cd">파일있음</span>`:""].filter(Boolean).join("");
const fh=[rMB("📚 다이어리","#7c3aed",d.diary),rMB("🌜 통화기록","#0891b2",d.call),rMB("☎️ 해석학","#0891b2",d.anal)].filter(Boolean).join("")||`<span style="font-size:12px;color:#c5c7d4">없음</span>`;
const fbh=d.feedbacks?.length?d.feedbacks.map(fb=>{const bm=fb.text.match(/업체명\s*[:：]\s*([^\n]+)/),bz=bm?bm[1].trim():`상담 ${fb.idx}`;const fm=[rMB("📷","#1d4ed8",fb.photos),rMB("🎙️","#15803d",fb.files)].filter(Boolean).join("");return`<div class="fbc"><div class="fbh"><span style="font-size:14px">🏢</span><span class="fbi">${bz}</span></div><div class="fbb"><div class="fbt">${fb.text}</div></div>${fm?`<div class="fbm">${fm}</div>`:""}</div>`;}).join(""):`<div style="font-size:12px;color:#c5c7d4;padding:4px 0">없음</div>`;
return`<div class="card"><div class="ch"><div class="av" style="background:${cl.bg};color:${cl.tx}">${av}</div><div><div class="mn">${p.name}</div><div class="mr">${d.weekday}</div></div><div class="hcs">${chips}</div></div><div class="tc"><div class="sec"><div class="sl"><div class="sd" style="background:#0073ea"></div>상담일정 보고</div><div class="tb">${d.schedule||"없음"}</div></div><div class="sec"><div class="sl"><div class="sd" style="background:#00c875"></div>퇴근 보고</div><div class="tb">${d.retire||"없음"}</div></div></div><div class="sec"><div class="sl"><div class="sd" style="background:#9b59b6"></div>첨부 파일</div>${fh}</div><div class="sec"><div class="sl"><div class="sd" style="background:#e2445c"></div>상담 자가피드백</div><div class="fbl">${fbh}</div></div></div>`;}
function parseItems(items){const CS="long_text_mm2emrmb",CR="long_text_mm2e6ef8",CD="file_mm2epezy",CC="file_mm2e8ef6",CA="file_mm2na6f5",CF="color_mm2epv27";const FBT=["long_text_mm2efqt4","long_text_mm2ep9ja","long_text_mm2eyexa","long_text_mm2ea524","long_text_mm2egjcb","long_text_mm2e8hg2","long_text_mm2enmmk"];const FBP=["file_mm2efy2b","file_mm2ekbcf","file_mm2en8ax","file_mm2egdeg","file_mm2egmha","file_mm2eqzmt",null];const FBF=["file_mm2ekzfs","file_mm2er3cj","file_mm2e5n7s","file_mm2e7n1k","file_mm2er9xn","file_mm2ed43y",null];const pm={};
for(const item of items){const subs=item.subitems||[];let pn=null;for(const s of subs){const cv=s.column_values||{};for(const c of[CS,CR]){const t=cv[c];if(t&&typeof t==="string"){const m=t.match(/\[([^\]]+)\]/);if(m){pn=m[1];break;}}}if(pn)break;}if(!pn)continue;if(!pm[pn])pm[pn]={name:pn,days:{}};
for(const s of subs){const cv=s.column_values||{},date=cv.date0;if(!date)continue;const cfv=cv[CF],cfl=typeof cfv==="object"?(cfv?.label||""):(cfv||"");const fbs=[];for(let i=0;i<FBT.length;i++){const txt=cv[FBT[i]];if(txt&&txt.trim()){fbs.push({text:txt,photos:FBP[i]?pf(cv[FBP[i]]):[],files:FBF[i]?pf(cv[FBF[i]]):[],idx:i+1});}}pm[pn].days[date]={weekday:s.name,diary:pf(cv[CD]),call:pf(cv[CC]),anal:pf(cv[CA]),schedule:cv[CS]||"",retire:cv[CR]||"",feedbacks:fbs,confirm:cfl};}}
return Object.values(pm).filter(p=>Object.keys(p.days).length>0);}
