<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업팀 일간 보고</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:#f5f6f8;color:#323338;font-size:13px}

.topbar{background:#fff;border-bottom:1px solid #e6e9ef;padding:8px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:14px;font-weight:700;color:#323338;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;background:#0073ea;border-radius:50%}
.topbar-right{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
.ts{font-size:11px;color:#676879}
.btn{font-size:12px;padding:5px 12px;border-radius:4px;border:1px solid #0073ea;background:#fff;color:#0073ea;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:#e8f0fe}
.btn:disabled{opacity:.5;cursor:default}

/* 주차 네비게이터 */
.week-nav{background:#fff;border-bottom:1px solid #e6e9ef;padding:8px 16px;display:flex;align-items:center;gap:8px}
.week-nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid #e6e9ef;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#676879}
.week-nav-btn:hover{background:#f5f6f8;color:#323338}
.week-nav-btn:disabled{opacity:.3;cursor:default}
.week-label{font-size:13px;font-weight:600;color:#323338;min-width:160px;text-align:center}
.week-today-btn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #e6e9ef;background:#fff;color:#676879;cursor:pointer}
.week-today-btn:hover{background:#f5f6f8}
.week-today-btn.active-week{background:#e8f0fe;color:#0073ea;border-color:#0073ea}

.day-tabs{display:flex;background:#fff;border-bottom:1px solid #e6e9ef;padding:0 16px;overflow-x:auto}
.day-tab{font-size:12px;padding:10px 16px;border-bottom:3px solid transparent;color:#676879;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.day-tab:hover{color:#323338;background:#f5f6f8}
.day-tab.active{color:#0073ea;border-bottom-color:#0073ea}
.day-dot{width:6px;height:6px;border-radius:50%;background:#00c875;display:none}
.day-tab.has-data .day-dot{display:inline-block}

.summary-bar{background:#fff;padding:8px 16px;border-bottom:1px solid #e6e9ef;display:flex;gap:6px;flex-wrap:wrap}
.sum-chip{font-size:11px;padding:4px 10px;border-radius:4px;background:#f5f6f8;color:#676879;border:1px solid #e6e9ef}
.sum-chip b{color:#323338;font-weight:600}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;padding:14px 16px}

.card{background:#fff;border-radius:8px;border:1px solid #e6e9ef;overflow:hidden}
.card-header{padding:11px 14px;border-bottom:1px solid #e6e9ef;display:flex;align-items:center;gap:10px;background:#fafbfc}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.mname{font-size:13px;font-weight:700;color:#323338}
.mrole{font-size:11px;color:#676879;margin-top:1px}
.header-chips{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.chip{font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:500}
.chip-new{background:#e8f0fe;color:#1565c0}
.chip-contract{background:#dcfce7;color:#15803d}
.chip-fee{background:#fef9c3;color:#854d0e}
.chip-confirm{background:#d1fae5;color:#065f46}
.chip-noconfirm{background:#f5f6f8;color:#676879;border:1px solid #e6e9ef}
.chip-diary{background:#ede9fe;color:#5b21b6}

.two-col{display:grid;grid-template-columns:1fr 1fr}
.section{padding:11px 14px;border-bottom:1px solid #e6e9ef}
.section:last-child{border-bottom:none}
.two-col .section:first-child{border-right:1px solid #e6e9ef}
.sec-label{font-size:10px;font-weight:700;color:#676879;letter-spacing:.4px;margin-bottom:7px;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.sec-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.text-box{font-size:12px;color:#323338;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:150px;overflow-y:auto}
.text-box::-webkit-scrollbar{width:3px}
.text-box::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}

.file-group{margin-bottom:10px}
.file-group:last-child{margin-bottom:0}
.file-group-lbl{font-size:10px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:4px}
.photo-full{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;border:1px solid #e6e9ef;cursor:pointer;display:block}
.photo-full:hover{opacity:.88}
.video-inline{width:100%;border-radius:6px;border:1px solid #e6e9ef;display:block;max-height:220px;background:#000;margin-bottom:4px}
.audio-player{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 10px;margin-bottom:4px}
.play-btn{width:28px;height:28px;border-radius:50%;background:#15803d;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-btn:hover{background:#166534}
.play-icon{width:0;height:0;border-style:solid;border-width:5px 0 5px 9px;border-color:transparent transparent transparent #fff;margin-left:2px}
.audio-info{flex:1;min-width:0}
.audio-name{font-size:11px;color:#15803d;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audio-progress{width:100%;height:3px;background:#bbf7d0;border-radius:2px;margin-top:4px;cursor:pointer}
.audio-bar{height:100%;background:#15803d;border-radius:2px;width:0%}
.audio-time{font-size:10px;color:#15803d;opacity:.7;flex-shrink:0}
.doc-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 9px;border-radius:4px;text-decoration:none;background:#f5f6f8;color:#676879;border:1px solid #e6e9ef;margin-bottom:4px}
.doc-chip:hover{background:#e6e9ef}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;padding:16px}
.lightbox.open{display:flex}
.lb-img{max-width:92vw;max-height:90vh;border-radius:8px;object-fit:contain}
.lb-close{position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.8}
.lb-close:hover{opacity:1}

.fb-list{display:flex;flex-direction:column;gap:8px}
.fb-card{border:1px solid #e6e9ef;border-radius:6px;overflow:hidden}
.fb-head{background:#fafbfc;padding:8px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #e6e9ef}
.fb-biz{font-size:12px;font-weight:700;color:#323338}
.fb-ic{width:18px;height:18px;border-radius:3px;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.fb-body{padding:10px 11px}
.fb-text{font-size:12px;color:#323338;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}
.fb-text::-webkit-scrollbar{width:3px}
.fb-text::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.fb-media{padding:10px 11px;border-top:1px solid #e6e9ef;background:#fafbfc}

.empty{padding:3rem;text-align:center;color:#676879;font-size:13px;grid-column:1/-1;line-height:2}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:#676879;gap:10px;font-size:13px;grid-column:1/-1}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid #e6e9ef;border-top-color:#0073ea;border-radius:50%;animation:spin .8s linear infinite}
.spin{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>

<div class="topbar">

resources/76829046/%EB%B0%95%EC%8A%B9%EC%A0%9C_2b_%EC%9C%84%EB%84%88%EC%8A%A4%EC%BB%A4%ED%94%BC%EC%9C%A8%ED%95%98%EC%A0%90%20_%EC%A0%95%EC%88%98%EB%B9%88_%20%EC%8B%A0%EA%B7%9C%202.m4a", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76829065/%EB%B0%95%EC%8A%B9%EC%A0%9C_2b_%EC%9C%84%EB%84%88%EC%8A%A4%EC%BB%A4%ED%94%BC%EC%9C%A8%ED%95%98%EC%A0%90%20_%EC%A0%95%EC%88%98%EB%B9%88_%20%EC%8B%A0%EA%B7%9C.m4a", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76854338/file_1873.jpg"], "idx": 2}, {"text": "※ 상담 후 자가 피드백 \n\n업체명 : 프로옷수선\n성함 : 주용훈\n전화번호 : 28273987\n수수료 : 6.5%\n가능한도 피치 : 2~3천\n\n1. 상담 목표를 달성 했는지?\n사업내용 잘 들어주고 클로징 들어갔으나 사기 당한 적이 있어 우리회사 지피티에 물어봄\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n지피티가 깔끔한 답변했고 답변 보면서 옆에서 음 다 아닌 내용들이네요 진행 도와드릴께요 했음. 수임료 반환에 대해 집착했고 자금 받게 도와드리겠다고 전달함. 매출 정정신고 동의했음\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n매출 정정신고 필요하며 폐업사업자 매출 발생 됨. 2차상담 마무리 후 컴퓨터 좀 만져달라해서 만져주고 있었는데 옆가게 사장왔고 대표자가 상담 받으라고 해서 바로 진행함\n\n계약 한 이유 3가지\n1. 지피티 깔끔한 답변\n2. 타회사는 능력 매우 없다 팩트 전달\n3. 매출정정신고 동의", "photos": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76844636/file_1855.jpg"], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76854573/file_1874.jpg", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76897803/%EB%B0%95%EC%8A%B9%EC%A0%9C_3b_%ED%94%84%EB%A1%9C%EC%98%B7%EC%88%98%EC%84%A0%20_%EC%A3%BC%EC%9A%A9%ED%9B%88_%20%EC%8B%A0%EA%B7%9C.mov"], "idx": 3}, {"text": "※ 상담 후 자가 피드백 \n\n업체명 : 핑 울산 달동점\n성함 : 서선미\n전화번호 : 63541625\n수수료 : 6.5%\n가능한도 피치 : 2~4천\n\n1. 상담 목표를 달성 했는지?\n 프로옷수선 옆가게 대표자분. 컨설팅에 대해 알아본 적 없다고 하여 차분히 진행\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n재단 4천 보유 중이고 4달 전에 담보대출 캐피탈 3천 받음. 월이자만 40만 원 이라고 하여 바로 암산해서 연금리 15% 확인\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 사업자 있음, 프로옷수선 옆가게, 직대 받은 건 없음\n\n계약 한 이유 3가지\n1. 프로옷수선 소개\n2. 생각필요하다길래 땡김\n3. 고금리 대출 4달전에 받음", "photos": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76850962/file_1867.jpg"], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76855559/file_1875.jpg"], "idx": 4}], "confirm": "컨펌 완료"}}}, {"name": "황소정 부팀장", "days": {"2026-06-15": {"weekday": "월요일", "diary": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76005467/file_1665.jpg"], "call": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76145640/file_1687.mp4"], "anal": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76145227/file_1686.jpg"], "schedule": "#일간 보고\n\n[황소정 부팀장] 26-06-15(월) \n\n«상담일정 보고»\n\n신규 : 0\n\n1. 콜미팅 예정\n\n\n«해야할 일 보고»\n\n없음", "retire": "#퇴근 보고\n\n[황소정 부팀장] 26-06-15(월) \n\n«상담일정 보고»\n\n신규 : 2\n\n1. 에스씨엔디 바이오 주식회사(전남 순천) -> 이사와 논의 후 회신\n\n2. 주식회사 금조산업개발(경북 경주) -> 수요일 계약 예정\n\n\n«해야할 일 보고»\n\n없음", "feedbacks": [{"text": "※ 상담 후 자가 피드백 \n\n업체명 : 에스씨엔디 바이오 주식회사\n성함 : 정미라\n전화번호 : 26983553\n수수료 : 7%\n가능한도 피치 : 5~7천\n\n1. 상담 목표를 달성 했는지?\n이전부터 몇개월간 컨택, 콜미팅 진행, 수수료 비싸다고 하시며 감사님과 상의한다고 하심. 본인이랑 같이 일하는 이사님이 지원사업은 알아서 다 챙긴다고 하심. 메리트 못느끼심.\n\n2. 상담 내용에 대한 문제점 및 좋았던 점?\n매출 잘 나오지만 사업자 기대출 많으심.\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 있고 사업자 법인으로 2개\n\n계약 못한 이유 3가지\n1. 성공보수 비싸다고 함\n2. 무상지원금을 회사 이사님이 다 챙기신다고 하심\n3. 무상지원금 메리트 못느끼심", "photos": [], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76112113/file_1670.jpg", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76141644/%ED%99%A9%EC%86%8C%EC%A0%95_1b_%EC%97%90%EC%8A%A4%EC%94%A8%EC%97%94%EB%94%94%20%EB%B0%94%EC%9D%B4%EC%98%A4%20%EC%A3%BC%EC%8B%9D%ED%9A%8C%EC%82%AC_%EC%A0%95%EB%AF%B8%EB%9D%BC_%20%EC%8B%A0%EA%B7%9C.m4a"], "idx": 1}, {"text": "※ 상담 후 자가 피드백 \n\n업체명 : 주식회사 금조산업개발\n성함 : 이상곤\n전화번호 : 3523-9068\n수수료 : 7%\n가능한도 피치 : 2~3천\n\n1. 상담 목표를 달성 했는지?\n 선결제 얘기하자마자 반응 안좋음. 이전에도 그러라해서 안한다고 했다 해서 무수임료로 조율, 오늘 본인 여직원이 신용취약 접수했다고 함. \n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n 선결제 거부감으로 그런 데는 절대 안하고 공동인증서 얘기도 안했는데 공동인증서는 절대 못준다고 뭐라하심. 무수임료로 수요일 오전 계약 예정\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n 폐업 없고 사업자 3개(나머지는 비영리단체)\n\n계약못한 이유 3가지\n1. 지금은 시간 안된다심\n2. 수요일 오전에 계약 예정\n3. 휴대폰 사용 못하셔서 직원 있을 때 계약 예정", "photos": [], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76124392/file_1673.jpg", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76141645/%ED%99%A9%EC%86%8C%EC%A0%95_2b_%EC%A3%BC%EC%8B%9D%ED%9A%8C%EC%82%AC%20%EA%B8%88%EC%A1%B0%EC%82%B0%EC%97%85%EA%B0%9C%EB%B0%9C_%EC%9D%B4%EC%83%81%EA%B3%A4_%20%EC%8B%A0%EA%B7%9C.m4a"], "idx": 2}], "confirm": "컨펌 완료"}, "2026-06-16": {"weekday": "화요일", "diary": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76227131/file_1697.jpg"], "call": [], "anal": [], "schedule": "#일간 보고\n\n[황소정 부팀장] 26-06-16(화) \n\n«상담일정 보고»\n\n신규 : 0\n\n1. 신용취약 접수 및 콜미팅 예정\n\n\n«해야할 일 보고»\n\n1. 도림이엔씨 수수료 일부금액인 57만5천원 한도초과로 결제 안됨, 통화 후 결제 필요.", "retire": null, "feedbacks": [{"text": "※ 상담 후 자가 피드백 \n\n업체명 : 밀\n성함 : 윤고운\n전화번호 : 3120-1915\n수수료 : 7%\n가능한도 피치 : 3~5천\n\n1. 상담 목표를 달성 했는지?\n공동명의 중 주대표와 상담함, 다른 데랑 많이 상담해 본 듯함. 신용도 900점대로 높고 기대출도 거의 없어서 6.5%까지는 조율 가능할 듯함. 이전에 본인이 접수 해보았으나 자꾸 빨리 마감되어서 못했다 함.\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n 여러 군데 금액 비교를 해보는 듯함. 자금은 급하여 무상지원금으로 땡기면 좋을 듯함. 성향 착하심. 의심 없음.\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 있고 사업자 1개 \n\n계약못한 이유 3가지\n1. 타 컨설팅 비교\n2. 비용으로 고민한다고 함.\n3. 금주까지 전화 주신다 함.", "photos": [], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76255400/%ED%99%A9%EC%86%8C%EC%A0%95_1b_%EB%B0%80%20%EC%8B%A0%EA%B7%9C2.m4a", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76255427/%ED%99%A9%EC%86%8C%EC%A0%95_1b_%EB%B0%80%20%EC%8B%A0%EA%B7%9C1.m4a", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76255495/file_1701.jpg"], "idx": 1}, {"text": "※ 상담 후 자가 피드백 \n\n업체명 : 대선기업운수\n성함 : 이정훈\n전화번호 : 81107517\n수수료 : 7%\n가능한도 피치 : 3~4천\n\n1. 상담 목표를 달성 했는지?\n홈페이지 절반결제로 문의, 전화 후 바로 계약 진행.\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n 대표자 자금 많이 필요하고 이미 컨설팅 경험 있음. 폐업 없고 올해 3월에 재단에서 자금 받았고, 대환대출까지 받음. 자금 최대한 많이 필요하심\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 없고 사업자 2개\n\n계약한 이유 3가지\n1. 자금 급함\n2. 홈페이지 제안서 직접 작성\n3. 자금 가능하다고 하고 바로 계약", "photos": [], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76281748/file_1705.jpg", "https://krbizinfo1.monday.com/protected_static/19795044/resources/76285536/%ED%99%A9%EC%86%8C%EC%A0%95_2b_%EB%8C%80%EC%84%A0%EA%B8%B0%EC%97%85%EC%9A%B4%EC%88%98%20%EC%8B%A0%EA%B7%9C.m4a"], "idx": 2}, {"text": "업체명 : 넥스텝\n성함 : 안태용\n전화번호 : 41751941\n수수료 : 7%\n가능한도피치 : 2~3천\n\n1. 상담 목표를 달성 했는지? \n홈페이지 제안서 문의로 무수임료로 바로 계약, 성향 좋으심.\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n재단에서 올해 1월 1천만원 승인 받으심. 매출은 작년 하반기엔 없고 올해 1~2천 발생했다 하였으나 홈택스 내 확인되는 매출은 80만원, 앞으로 모든 매출 계산서 혹은 현금영수증 발행해달라 요청드림.\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 없고 사업자 1개\n\n계약한 이유 3가지\n1. 홈페이지 문의\n2. 자금 급함, 의심 있으신데 무수임료로 조율\n3. 성향 좋으심", "photos": [], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76308943/%ED%99%A9%EC%86%8C%EC%A0%95_3b_%EB%84%A5%EC%8A%A4%ED%85%9D%20%EC%8B%A0%EA%B7%9C.m4a"], "idx": 3}, {"text": "업체명 : 옛 이오시아\n성함 : 이영희\n전화번호 : 4552-0723\n수수료 : 7%\n가능한도피치 : 2~3천\n\n1. 상담 목표를 달성 했는지? \n 전화 하자마자 다른거랑 헷갈려서 필요없어요~ 하시다가 아 정책자금 제가 되나요? 하고 들으심, 비용 비싸다고 하셔서 수임료 10만원으로 조율해드림. 지금도 대출 받으러 가는 중이라심. 그런데 계약서 보내고 1시간 뒤에 전화달래서 전화 드렸더니 바쁘다고 나중에 전화 한다심.\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n 신용취약 3천, 재단 3천 받으심. 성격이 솔직하고 목소리가 크신 편. 통화에 집중 잘 못하심.\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 있고 사업자 1개, 신용 6~7백점대\n\n계약못한 이유 3가지\n1. 바쁘다고 전화 거절\n2. 계약서 보냈으나 연락 어려움\n3. 자금은 급하다셔서 재연락 예정", "photos": [], "files": ["https://krbizinfo1.monday.com/protected_static/19795044/resources/76314329/%ED%99%A9%EC%86%8C%EC%A0%95_4b_%EC%98%9B%20%EC%9D%B4%EC%98%A4%EC%8B%9C%EC%95%84%20%EC%8B%A0%EA%B7%9C.m4a"], "idx": 4}, {"text": "※ 상담 후 자가 피드백 \n\n업체명 : 찌개마을시골촌\n성함 : 심규혁\n전화번호 : 99992118\n수수료 : 7%\n가능한도피치 : 2~3천\n\n1. 상담 목표를 달성 했는지? \n24년부터 체납이라 1천4백 체납에 신용회복 2년찬데 신용 350점, 장기체납이라 떨어진 듯함. 비용 고민해보고 전화준다 함.\n수임료 조율은 가능하다고 언지해놓음\n\n2. 상담 내용에 대한 문제점 및 좋았던 점\n체납으로 인해 떨어진 신용부터 해결해야 할 듯함, 재단 대위변제 해당 사업자로 있어서 소진공 채무조정밖에 진행 어려울 듯함.\n\n3. 차후 해당 고객과의 만남에 참고해야할 점?\n폐업 없고 사업자 1개, 신용 200에 350\n\n계약 못 한 이유 3가지\n1.  자금 나오기 어려울 듯하여 그렇게 끌지 못함\n2. 비용때문에 고민해보고 전화준다 function getWeekDates(offset){
  const now=new Date(),d=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(d===0?6:d-1)+(offset*7));
  return Array.from({length:5},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().slice(0,10)});
}

function formatWeekLabel(wdates){
  const s=wdates[0],e=wdates[4];
  const sm=s.slice(5,7),sd=s.slice(8),em=e.slice(5,7),ed=e.slice(8);
  const now=new Date().toISOString().slice(0,10);
  const isThis=wdates.includes(now)||(now>e&&weekOffset===0);
  const weekNum=getWeekNum(wdates[0]);
  return `${s.slice(0,4)}년 ${parseInt(sm)}월 ${weekNum}주차 (${sm}/${sd} ~ ${em}/${ed})`;
}

function getWeekNum(dateStr){
  const d=new Date(dateStr),y=d.getFullYear(),m=d.getMonth();
  const first=new Date(y,m,1),firstDay=first.getDay();
  return Math.ceil((d.getDate()+firstDay)/7);
}

  const btn=document.getElementById("pb_"+id),bar=document.getElementById("bar_"+id),timeEl=document.getElementById("time_"+id);
  if(a.paused){
    Object.entries(audioMap).forEach(([k,v])=>{if(k!==id&&!v.paused){v.pause();document.getElementById("pb_"+k).innerHTML='<div class="play-icon"></div>';}});
    a.play();
    btn.innerHTML='<div style="display:flex;gap:2px"><div style="width:3px;height:10px;background:#fff;border-radius:1px"></div><div style="width:3px;height:10px;background:#fff;border-radius:1px"></div></div>';
  }else{a.pause();btn.innerHTML='<div class="play-icon"></div>';}
  a.ontimeupdate=()=>{if(a.duration){bar.style.width=(a.currentTime/a.duration*100)+"%";}const m=Math.floor(a.currentTime/60),s=Math.floor(a.currentTime%60);timeEl.textContent=m+":"+String(s).padStart(2,"0");};
  a.onended=()=>{btn.innerHTML='<div class="play-icon"></div>';bar.style.width="0%";};
}
function seekAudio(e,id){const a=audioMap[id];if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();a.currentTime=(e.clientX-r.left)/r.width*a.duration;}
function renderAudio(url,idx){
  const id="aud_"+Math.random().toString(36).slice(2),name=fn(url,idx);
  setTimeout(()=>{audioMap[id]=new Audio(url);},0);
  return`<div class="audio-player"><button class="play-btn" id="pb_${id}" onclick="toggleAudio('${id}')"><div class="play-icon"></div></button><div class="audio-info"><div class="audio-name">${name}</div><div class="audio-progress" onclick="seekAudio(event,'${id}')"><div class="audio-bar" id="bar_${id}"></div></div></div><span class="audio-time" id="time_${id}">0:00</span></div>`;
}
function renderMediaBlock(label,color,files){
  if(!files||!files.length)return"";
  const photos=files.filter(u=>ft(u)==="photo"),audios=files.filter(u=>ft(u)==="audio"),videos=files.filter(u=>ft(u)==="video"),docs=files.filter(u=>ft(u)==="doc");
  let html=`<div class="file-group"><div class="file-group-lbl" style="color:${color}">${label}</div>`;
  if(photos.length)html+=`<div class="photo-grid">${photos.map((u,i)=>`<img class="photo-full" src="${u}" alt="" onclick="openLb('${u}')" loading="lazy" onerror="this.style.display='none'">`).join("")}</div>`;
  if(videos.length)html+=videos.map(u=>`<video class="video-inline" controls preload="metadata" src="${u}" onerror="this.parentElement.style.display='none'"></video>`).join("");
  if(audios.length)html+=audios.map((u,i)=>renderAudio(u,i)).join("");
  if(docs.length)html+=docs.map((u,i)=>`<a class="doc-chip" href="${u}" target="_blank">📄 ${fn(u,i)}</a>`).join("");
  return html+"</div>";
}

function changeWeek(dir){
  // 미래 주는 막기
  if(dir>0&&weekOffset>=0)return;
  weekOffset+=dir;
  refreshView();
}

function goToCurrentWeek(){
  weekOffset=0;
  refreshView();
}

function refreshView(){
  const wdates=getWeekDates(weekOffset);
  const today=new Date().toISOString().slice(0,10);
  
  // 현재 주면 오늘 or 가장 최근 데이터 날짜 선택
  // 다른 주면 데이터 있는 날 중 가장 마지막 날 선택
  const datesWithData=wdates.filter(d=>persons.some(p=>p.days[d]&&Object.keys(p.days[d]).length>0));
  if(datesWithData.length>0){
    // 데이터 있는 날 중 오늘이면 오늘, 아니면 가장 최근
    selDate=datesWithData.includes(today)?today:datesWithData[datesWithData.length-1];
  }else{
    selDate=wdates.includes(today)?today:wdates[4];
  }

  // 주차 레이블
  document.getElementById("weekLabel").textContent=formatWeekLabel(wdates);
  // 이번주 버튼 강조
  document.getElementById("todayBtn").classList.toggle("active-week",weekOffset===0);
  // 다음주 버튼 비활성화
  document.getElementById("nextWeekBtn").disabled=weekOffset>=0;

  renderTabs(wdates);
  render(wdates);
}

function renderTabs(wdates){
  const lbs=["월","화","수","목","금"];
  document.getElementById("dayTabs").innerHTML=wdates.map((d,i)=>{
    const hasData=persons.some(p=>p.days[d]&&Object.keys(p.days[d]).length>0);
    return`<div class="day-tab ${d===selDate?"active":""} ${hasData?"has-data":""}" onclick="selDay('${d}','${wdates.join(",")}')">
      <div class="day-dot"></div>${lbs[i]}요일 <span style="color:#c5c7d4;font-size:11px">${d.slice(5).replace("-",".")}</span>
    </div>`;
  }).join("");
}

function selDay(d,wStr){
  selDate=d;
  const dates=wStr.split(","),wdates=dates;
  document.querySelectorAll(".day-tab").forEach((t,i)=>t.classList.toggle("active",dates[i]===d));
  render(wdates);
}

function render(wdates){
  if(!wdates)wdates=getWeekDates(weekOffset);
  const withDay=persons.filter(p=>p.days[selDate]);
  const tn=withDay.reduce((a,p)=>{const m=(p.days[selDate]?.retire||"").match(/신규\s*[:：]\s*(\d+)/);return a+(m?+m[1]:0);},0);
  const tc=withDay.reduce((a,p)=>{const m=(p.days[selDate]?.retire||"").match(/계약\s*[:：]\s*([\d.]+)/);return a+(m?+m[1]:0);},0);
  const tf=withDay.reduce((a,p)=>{const m=(p.days[selDate]?.retire||"").match(/수임료\s*[:：]\s*([\d.]+)/);return a+(m?+m[1]:0);},0);
  const cdone=withDay.filter(p=>p.days[selDate]?.confirm==="컨펌 완료").length;
  document.getElementById("summaryBar").innerHTML=[
    `<div class="sum-chip">보고 <b>${withDay.length}명</b></div>`,
    `<div class="sum-chip">신규 <b>${tn}건</b></div>`,
    `<div class="sum-chip">계약 <b>${tc}건</b></div>`,
    tf>0?`<div class="sum-chip">수임료 <b>${tf.toFixed(1)}</b></div>`:"",
    `<div class="sum-chip">컨펌 <b>${cdone}/${withDay.length>0?withDay.length:persons.length}</b></div>`,
    persons.length-withDay.length>0?`<div class="sum-chip" style="opacity:.6">미제출 ${persons.length-withDay.length}명</div>`:""
  ].filter(Boolean).join("");

  if(!withDay.length){
    const hasFuture=selDate>new Date().toISOString().slice(0,10);
    document.getElementById("mainGrid").innerHTML=`<div class="empty">${hasFuture?"📅 아직 보고가 올라오지 않은 날짜예요":"📋 해당 날짜의 보고가 없어요"}<br><span style="font-size:12px;color:#c5c7d4">← 이전 주 버튼으로 지난 보고를 확인할 수 있어요</span></div>`;
    return;
  }
  audioMap={};
  document.getElementById("mainGrid").innerHTML=persons.map(p=>renderCard(p)).join("");
}

function renderCard(p){
  const d=p.days[selDate],clr=gc(p.name),av=ini(p.name);
  if(!d)return`<div class="card"><div class="card-header"><div class="avatar" style="background:${clr.bg};color:${clr.tx}">${av}</div><div><div class="mname">${p.name}</div><div class="mrole">미제출</div></div><div class="header-chips"><span class="chip chip-noconfirm">보고 없음</span></div></div></div>`;
  const st=es(d.retire);
  const chips=[
    st.newCount?`<span class="chip chip-new">신규 ${st.newCount}건</span>`:"",
    st.contract?`<span class="chip chip-contract">계약 ${st.contract}건</span>`:"",
    st.fee?`<span class="chip chip-fee">수임 ${st.fee}</span>`:"",
    d.confirm==="컨펌 완료"?`<span class="chip chip-confirm">✓ 컨펌완료</span>`:`<span class="chip chip-noconfirm">미컨펌</span>`,
    (d.diary?.length||d.call?.length||d.anal?.length)?`<span class="chip chip-diary">파일있음</span>`:""
  ].filter(Boolean).join("");
  const filesHtml=[renderMediaBlock("📚 다이어리","#7c3aed",d.diary),renderMediaBlock("🌜 통화기록","#0891b2",d.call),renderMediaBlock("☎️ 해석학","#0891b2",d.anal)].filter(Boolean).join("")||`<span style="font-size:12px;color:#c5c7d4">없음</span>`;
  const fbHtml=d.feedbacks?.length?d.feedbacks.map(fb=>{
    const bizM=fb.text.match(/업체명\s*[:：]\s*([^
]+)/),biz=bizM?bizM[1].trim():`상담 ${fb.idx}`;
    const fbMedia=[renderMediaBlock("📷 사진","#1d4ed8",fb.photos),renderMediaBlock("🎙️ 녹취","#15803d",fb.files)].filter(Boolean).join("");
    return`<div class="fb-card"><div class="fb-head"><div class="fb-ic">🏢</div><span class="fb-biz">${biz}</span></div><div class="fb-body"><div class="fb-text">${fb.text}</div></div>${fbMedia?`<div class="fb-media">${fbMedia}</div>`:""}</div>`;
  }).join(""):`<div style="font-size:12px;color:#c5c7d4;padding:4px 0">없음</div>`;

  return`<div class="card">
    <div class="card-header"><div class="avatar" style="background:${clr.bg};color:${clr.tx}">${av}</div><div><div class="mname">${p.name}</div><div class="mrole">${d.weekday}</div></div><div class="header-chips">${chips}</div></div>
    <div class="two-col"><div class="section"><div class="sec-label"><div class="sec-dot" style="background:#0073ea"></div>상담일정 보고</div><div class="text-box">${d.schedule||"없음"}</div></div><div class="section"><div class="sec-label"><div class="sec-dot" style="background:#00c875"></div>퇴근 보고</div><div class="text-box">${d.retire||"없음"}</div></div></div>
    <div class="section"><div class="sec-label"><div class="sec-dot" style="background:#9b59b6"></div>첨부 파일</div>${filesHtml}</div>
    <div class="section"><div class="sec-label"><div class="sec-dot" style="background:#e2445c"></div>상담 자가피드백</div><div class="fb-list">${fbHtml}</div></div>
  </div>`;
}

function parseItems(items,wdates){
  const CS="long_text_mm2emrmb",CR="long_text_mm2e6ef8",CD="file_mm2epezy",CC="file_mm2e8ef6",CA="file_mm2na6f5",CF="color_mm2epv27";
  const FBT=["long_text_mm2efqt4","long_text_mm2ep9ja","long_text_mm2eyexa","long_text_mm2ea524","long_text_mm2egjcb","long_text_mm2e8hg2","long_text_mm2enmmk"];
  const FBP=["file_mm2efy2b","file_mm2ekbcf","file_mm2en8ax","file_mm2egdeg","file_mm2egmha","file_mm2eqzmt",null];
  const FBF=["file_mm2ekzfs","file_mm2er3cj","file_mm2e5n7s","file_mm2e7n1k","file_mm2er9xn","file_mm2ed43y",null];
  const pm={};
  for(const item of items){
    const subs=item.subitems||[];let pn=null;
    for(const s of subs){const cv=s.column_values||{};for(const c of[CS,CR]){const t=cv[c];if(t&&typeof t==="string"){const m=t.match(/\[([^\]]+)\]/);if(m){pn=m[1];break;}}}if(pn)break;}
    if(!pn)continue;if(!pm[pn])pm[pn]={name:pn,days:{}};
    for(const s of subs){const cv=s.column_values||{},date=cv.date0;
      if(!date)continue;
      const cfv=cv[CF],cfl=typeof cfv==="object"?(cfv?.label||""):(cfv||"");
      const fbs=[];
      for(let i=0;i<FBT.length;i++){const txt=cv[FBT[i]];if(txt&&txt.trim()){fbs.push({text:txt,photos:FBP[i]?pf(cv[FBP[i]]):[],files:FBF[i]?pf(cv[FBF[i]]):[],idx:i+1});}}
      pm[pn].days[date]={weekday:s.name,diary:pf(cv[CD]),call:pf(cv[CC]),anal:pf(cv[CA]),schedule:cv[CS]||"",retire:cv[CR]||"",feedbacks:fbs,confirm:cfl};
    }
  }
  return Object.values(pm).filter(p=>Object.keys(p.days).length>0);
}

async function loadLive(){
  const btn=document.getElementById("refreshBtn"),icon=document.getElementById("ri");
  btn.disabled=true;icon.className="spin";
  document.getElementById("mainGrid").innerHTML=`<div class="loading"><div class="spinner"></div>최신 데이터 불러오는 중...</div>`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        system:`Fetch board ${BOARD_ID} items with subitems and all columns. Return pure JSON items array only.`,
        messages:[{role:"user",content:`Get all items with subitems and columns from monday board ${BOARD_ID}`}],
        mcp_servers:[{type:"url",url:MCP_URL,name:"monday-mcp"}]
      })});
    const d=await res.json();let items=[];
    for(const b of(d.content||[])){
      if(b.type==="mcp_tool_result"){try{const p=JSON.parse(b.content?.[0]?.text||"{}");if(p.items){items=p.items;break;}if(Array.isArray(p)){items=p;break;}}catch(e){}}
      if(b.type==="text"&&!items.length){try{const t=b.text.trim(),s=t.indexOf("[");if(s>=0){const a=JSON.parse(t.slice(s,t.lastIndexOf("]")+1));if(a.length){items=a;break;}}}catch(e){}}
    }
    if(!items.length)throw new Error("데이터 없음");
    // 모든 날짜 허용해서 파싱
    persons=parseItems(items,[]);
    document.getElementById("tsLabel").textContent="업데이트: "+new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
  }catch(e){
    persons=FALLBACK;
    document.getElementById("tsLabel").textContent="캐시 데이터";
  }
  refreshView();
  btn.disabled=false;icon.className="";icon.textContent="↻";
}

// 초기화 — 캐시 데이터로 시작, 가장 최근 데이터가 있는 주로 이동
(function(){
  persons=FALLBACK;
  // 캐시 데이터의 날짜들 중 가장 최근 날짜 찾기
  const allDates=[];
  persons.forEach(p=>Object.keys(p.days).forEach(d=>allDates.push(d)));
  const latestDate=allDates.sort().pop()||new Date().toISOString().slice(0,10);
  // 해당 날짜가 몇 주 전인지 계산
  const now=new Date(),d=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(d===0?6:d-1));
  const latestD=new Date(latestDate);
  const diff=Math.round((mon-latestD)/(7*24*60*60*1000));
  weekOffset=-diff;
  document.getElementById("tsLabel").textContent="캐시 데이터 | 새로고침으로 최신 불러오기";
  refreshView();
})();
</script>
